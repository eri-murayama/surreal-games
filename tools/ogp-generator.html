<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>OGP画像生成ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; font-family: sans-serif; color: #fff; }
    canvas { border: 2px solid #666; max-width: 90vw; height: auto; }
    button { padding: 12px 32px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; background: #6c5ce7; color: #fff; }
    button:hover { background: #5a4bd1; }
    .info { font-size: 14px; color: #aaa; }
  </style>
</head>
<body>
  <p class="info">1200 × 630px — OGP画像プレビュー</p>
  <canvas id="canvas" width="1200" height="630"></canvas>
  <button id="download">PNGをダウンロード</button>
  <p class="info">ダウンロード後 assets/images/ogp.png に上書き保存してください</p>

  <script>
    const W = 1200, H = 630;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const charaImg = new Image();
    charaImg.src = '../assets/images/illust9.png';

    charaImg.onload = draw;
    charaImg.onerror = draw;

    function draw() {
      // --- 背景グラデーション ---
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, '#0d0221');
      bg.addColorStop(0.5, '#1a0a3e');
      bg.addColorStop(1, '#2d1b69');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // --- 光の演出 ---
      const g1 = ctx.createRadialGradient(W * 0.2, H * 0.3, 0, W * 0.2, H * 0.3, 350);
      g1.addColorStop(0, 'rgba(255, 110, 199, 0.18)');
      g1.addColorStop(1, 'transparent');
      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, W, H);

      const g2 = ctx.createRadialGradient(W * 0.8, H * 0.7, 0, W * 0.8, H * 0.7, 350);
      g2.addColorStop(0, 'rgba(0, 255, 247, 0.12)');
      g2.addColorStop(1, 'transparent');
      ctx.fillStyle = g2;
      ctx.fillRect(0, 0, W, H);

      // --- キャラクター画像 ---
      if (charaImg.complete && charaImg.naturalWidth > 0) {
        ctx.save();
        const cw = 340, ch = cw * (charaImg.naturalHeight / charaImg.naturalWidth);
        const cx = 160, cy = (H - ch) / 2 + 10;
        ctx.translate(cx + cw / 2, cy + ch / 2);
        ctx.rotate(-3 * Math.PI / 180);
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 30;
        ctx.shadowOffsetY = 8;
        ctx.drawImage(charaImg, -cw / 2, -ch / 2, cw, ch);
        ctx.restore();
      }

      // --- タイトル文字（グラデーション） ---
      ctx.save();
      ctx.font = '700 72px "Hachi Maru Pop", "Zen Maru Gothic", "Hiragino Maru Gothic Pro", sans-serif';
      ctx.textBaseline = 'top';

      const titleGrad = ctx.createLinearGradient(560, 0, 1050, 0);
      titleGrad.addColorStop(0, '#ff6ec7');
      titleGrad.addColorStop(1, '#00fff7');
      ctx.fillStyle = titleGrad;

      ctx.fillText('シュール', 580, 170);
      ctx.fillText('ゲームス', 580, 260);
      ctx.restore();

      // --- サブタイトル ---
      ctx.save();
      ctx.font = '400 28px "Zen Kaku Gothic New", "Hiragino Kaku Gothic Pro", sans-serif';
      ctx.fillStyle = '#b0a8c8';
      ctx.textBaseline = 'top';
      ctx.fillText('かわいいキャラクターと過ごす、', 580, 370);
      ctx.fillText('素敵な時間', 580, 410);
      ctx.restore();
    }

    document.getElementById('download').addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = 'ogp.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  </script>
</body>
</html>
