<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>OGP画像生成用</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #888; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .ogp {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0d0221 0%, #1a0a3e 50%, #2d1b69 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    .ogp::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 110, 199, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 255, 247, 0.1) 0%, transparent 50%);
    }
    .chara {
      width: 380px;
      height: auto;
      filter: drop-shadow(0 8px 30px rgba(0, 0, 0, 0.4));
      position: relative;
      z-index: 1;
      transform: rotate(-3deg);
    }
    .text-area {
      position: relative;
      z-index: 1;
      text-align: left;
    }
    .title {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 72px;
      background: linear-gradient(90deg, #ff6ec7, #00fff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
    }
    .subtitle {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 28px;
      color: #b0a8c8;
      margin-top: 20px;
      line-height: 1.6;
    }
    .instruction {
      margin-top: 20px;
      color: #fff;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div>
    <div class="ogp" id="ogp">
      <img src="../assets/images/illust9.png" alt="" class="chara">
      <div class="text-area">
        <div class="title">シュール<br>ゲームス</div>
        <div class="subtitle">意味不明なゲームを<br>作っています</div>
      </div>
    </div>
    <p class="instruction">
      このページをブラウザで開き、上の画像部分(1200x630)をスクリーンショットして<br>
      assets/images/ogp.png として保存してください
    </p>
  </div>
</body>
</html>
