<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かにかにパニック！ - もぐらたたき</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 左右デコレーション -->
  <div class="side-deco side-deco--left">
    <img src="kanikani.png" class="deco-chara deco-chara--1" alt="">
    <div class="deco-bubble deco-bubble--1">腹筋は<br>毎日換気！</div>
    <div class="deco-star">✦</div>
    <div class="deco-star deco-star--2">❀</div>
    <div class="deco-star deco-star--3">✧</div>
  </div>
  <div class="side-deco side-deco--right">
    <img src="kanikani.png" class="deco-chara deco-chara--2" alt="">
    <div class="deco-bubble deco-bubble--2">叩いても<br>また出るよ！</div>
    <div class="deco-star deco-star--4">♪</div>
    <div class="deco-star deco-star--5">✦</div>
    <div class="deco-star deco-star--6">❀</div>
  </div>

  <div id="game-wrapper">
    <h1 class="game-title">🦀 かにかにパニック！ 🦀</h1>
    <p class="game-subtitle">夢の中のヤクザ「かにかに」を叩け！腹筋は毎日換気するよ！</p>

    <!-- スコア・タイマー -->
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">スコア</span>
        <span id="score" class="hud-value">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">残り時間</span>
        <span id="timer" class="hud-value">30</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">コンボ</span>
        <span id="combo" class="hud-value">0</span>
      </div>
    </div>

    <!-- ゲームボード -->
    <div id="board">
      <div class="hole" data-index="0"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
      <div class="hole" data-index="1"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
      <div class="hole" data-index="2"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
      <div class="hole" data-index="3"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
      <div class="hole" data-index="4"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
      <div class="hole" data-index="5"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
      <div class="hole" data-index="6"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
      <div class="hole" data-index="7"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
      <div class="hole" data-index="8"><div class="hole-bg"></div><div class="mole-container"><img src="kanikani.png" class="mole" alt="かにかに"></div></div>
    </div>

    <!-- スタート / リザルト -->
    <div id="overlay" class="overlay">
      <div id="overlay-content">
        <div id="start-screen">
          <div class="overlay-icon">🦀</div>
          <h2>かにかにパニック！</h2>
          <p>穴から出てくる「かにかに」を<br>叩きまくれ！制限時間30秒！</p>
          <button id="start-btn">ゲームスタート</button>
        </div>
        <div id="result-screen" class="hidden">
          <div class="overlay-icon">🎉</div>
          <h2>終了〜！</h2>
          <p id="result-score"></p>
          <p id="result-rank"></p>
          <p id="result-comment"></p>
          <button id="retry-btn">もう一回やる</button>
        </div>
      </div>
    </div>

    <!-- ヒットエフェクト用 -->
    <div id="hit-effects"></div>
  </div>

  <!-- カスタムカーソル（釘バット） -->
  <div id="custom-cursor">
    <div id="cursor-bat"></div>
  </div>

  <a href="../../index.html" class="back-to-top-link">← トップに戻る</a>
  <script src="game.js"></script>
</body>
</html>
